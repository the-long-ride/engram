name: docs

on:
  pull_request:
    paths:
      - 'website/**'
      - 'documentation/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'documentation/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Install docs dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile
      - name: Typecheck docs
        working-directory: website
        run: pnpm typecheck
      - name: Build docs
        working-directory: website
        run: pnpm build
      - name: Verify field docs coverage
        working-directory: website
        run: pnpm check:entry-fields
