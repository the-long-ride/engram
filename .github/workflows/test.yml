name: Test & Coverage

on:
  push:
  workflow_call:
  workflow_dispatch:

jobs:
  verify:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'src/cli/**'
              - 'src/commands/**'
              - 'src/core/analysis/**'
              - 'src/core/cli/**'
              - 'src/core/config-db/**'
              - 'src/core/integrations/**'
              - 'src/core/memory/**'
              - 'src/core/runtime/**'
              - 'src/core/safety/**'
              - 'src/core/system/**'
              - 'src/core/vcs/**'
              - 'src/core/web/**'
              - 'src/mcp/**'
              - 'tests/*.test.mjs'
              - 'tests/cli/**'
              - 'tests/mcp.test.mjs'
              - 'tests/publish/**'
              - 'tests/helpers.mjs'
              - 'scripts/run-tests.mjs'
              - 'scripts/generate-version.mjs'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/test.yml'
            app:
              - 'src/core/web/app/**'
              - 'tests/app/**'
              - 'jest.config.cjs'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/test.yml'
            lines:
              - 'src/**'
              - 'scripts/**'
              - 'media/logo/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/test.yml'

      - name: Decide verification scope
        id: scope
        run: |
          force=false
          if [ "${{ github.event_name }}" = "workflow_call" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            force=true
          fi
          echo "force=$force" >> "$GITHUB_OUTPUT"
          echo "core=$([ "$force" = "true" ] || [ "${{ steps.changes.outputs.core }}" = "true" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "app=$([ "$force" = "true" ] || [ "${{ steps.changes.outputs.app }}" = "true" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "lines=$([ "$force" = "true" ] || [ "${{ steps.changes.outputs.lines }}" = "true" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.scope.outputs.core == 'true' || steps.scope.outputs.app == 'true' || steps.scope.outputs.lines == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.scope.outputs.core == 'true' || steps.scope.outputs.app == 'true' || steps.scope.outputs.lines == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.scope.outputs.core == 'true' || steps.scope.outputs.app == 'true'
        run: npm run typecheck

      - name: Line check
        if: steps.scope.outputs.lines == 'true'
        run: npm run lint:lines

      - name: Test Core
        if: steps.scope.outputs.core == 'true'
        run: npm test

      - name: Test App
        if: steps.scope.outputs.app == 'true'
        run: npm run test:app

      - name: Run coverage
        if: steps.scope.outputs.core == 'true'
        run: npm run coverage
