name: Test & Coverage

on:
  schedule:
    - cron: '17 6 * * *'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'website/**'
      - 'documentation/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'jest.config.cjs'
      - '.github/workflows/test.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/deploy-docs.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'website/**'
      - 'documentation/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'jest.config.cjs'
      - '.github/workflows/test.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Full test suite on every supported Node LTS line that can fire on push/pull_request/scheduled.
  # The reusable `workflow_call` from release.yml also runs this job, so a successful release
  # always has a complete suite behind it.
  verify:
    name: Full suite (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Line check
        run: npm run lint:lines

      - name: Run full test suite
        run: npm test

      - name: Run coverage
        run: npm run coverage

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup website Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Typecheck website
        working-directory: website
        run: pnpm typecheck

      - name: Run website tests
        working-directory: website
        run: pnpm test

      - name: Run website coverage
        working-directory: website
        run: |
          node --input-type=module -e "import('../scripts/run-related-tests.mjs').then(async ({ websiteTestFiles }) => console.log((await websiteTestFiles()).join('\n')))" > /tmp/website-tests.txt
          node --experimental-test-coverage --import tsx --test --test-isolation=none $(cat /tmp/website-tests.txt)

  # Cross-platform smoke job: catches path/config/CLI regressions on the operating systems the
  # package supports but does not run the full suite (keeps cost bounded).
  smoke:
    name: Smoke (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        node: [24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Core smoke tests
        run: npm run test:core
