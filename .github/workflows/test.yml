name: Test & Coverage

on:
  push:
  workflow_call:
  workflow_dispatch:

jobs:
  verify:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Line check
        run: npm run lint:lines

      - name: Test Core
        run: npm test

      - name: Test App
        run: npm run test:app

      - name: Run coverage
        run: npm run coverage
