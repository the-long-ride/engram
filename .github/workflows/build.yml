name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test Gate
    uses: ./.github/workflows/test.yml

  coverage:
    name: Coverage Gate
    uses: ./.github/workflows/coverage.yml

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack dry-run
        run: npm run pack:dry-run
