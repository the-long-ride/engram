name: Test & Coverage

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'website/**'
      - 'documentation/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'jest.config.cjs'
      - '.github/workflows/test.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/deploy-docs.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'website/**'
      - 'documentation/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'jest.config.cjs'
      - '.github/workflows/test.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_call:
  workflow_dispatch:

jobs:
  verify:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide event scope
        id: scope
        run: |
          force=false
          if [ "${{ github.event_name }}" = "workflow_call" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            force=true
          fi
          echo "force=$force" >> "$GITHUB_OUTPUT"

      - name: Detect changed files
        if: steps.scope.outputs.force != 'true'
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/**
            tests/**
            scripts/**
            website/**
            documentation/**
            docs/**
            README.md
            CHANGELOG.md
            package.json
            package-lock.json
            tsconfig.json
            jest.config.cjs
            .github/workflows/test.yml
            .github/workflows/docs.yml
            .github/workflows/deploy-docs.yml

      - name: Setup Node
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        run: npm run typecheck

      - name: Line check
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        run: npm run lint:lines

      - name: Run all tests
        if: steps.scope.outputs.force == 'true'
        run: npm test

      - name: Setup pnpm
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup website Node cache
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Run related tests
        if: steps.scope.outputs.force != 'true' && steps.changed.outputs.any_changed == 'true'
        run: npm run test:related -- ${{ steps.changed.outputs.all_changed_files }}

      - name: Run coverage
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        run: npm run coverage

      - name: Typecheck website
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        working-directory: website
        run: pnpm typecheck

      - name: Run website tests
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        working-directory: website
        run: pnpm test

      - name: Run website coverage
        if: steps.scope.outputs.force == 'true' || steps.changed.outputs.any_changed == 'true'
        working-directory: website
        run: |
          node --input-type=module -e "import('../scripts/run-related-tests.mjs').then(async ({ websiteTestFiles }) => console.log((await websiteTestFiles()).join('\n')))" > /tmp/website-tests.txt
          node --experimental-test-coverage --import tsx --test --test-isolation=none $(cat /tmp/website-tests.txt)
