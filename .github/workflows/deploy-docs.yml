name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'documentation/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile
      - name: Build site
        working-directory: website
        run: pnpm build
      - name: Verify field docs coverage
        working-directory: website
        run: pnpm check:entry-fields
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
