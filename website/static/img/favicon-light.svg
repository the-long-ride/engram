<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="254 103 516 777" role="img" aria-labelledby="title desc">
  <title id="title">Engram Logo - Black</title>
  <desc id="desc">Monochrome transparent SVG version of the Engram logo.</desc>
  <defs>
    <style>
      .bracket-main { fill: none; stroke-width: 30; stroke-linecap: butt; stroke-linejoin: miter; }
      .bracket-highlight { fill: none; stroke-width: 4; stroke-linecap: butt; stroke-linejoin: miter; opacity: .85; }
      .circuit-line { fill: none; stroke-width: 4.6; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: none; stroke-width: 4.2; }
      .center-line { fill: none; stroke-width: 5.2; stroke-linecap: round; }
      .tree-trunk { fill: none; stroke-width: 5.4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <g id="engram-mark" transform="translate(0 0)">
